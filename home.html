<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Aluno</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #1f2937; }
.container { max-width: 1200px; margin: 0 auto; }
.cabecalho { background: white; padding: 20px 30px; border-radius: 16px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
.cabecalho h2 { color: #1f2937; }
.cabecalho h2 span { color: #667eea; }
.btn-sair { padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-sair:hover { background: #dc2626; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
.card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.card h3 { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
.card h3 .icon { font-size: 20px; }
.card h3 .titulo { color: #1f2937; }
.lista-provas { max-height: 300px; overflow-y: auto; }
.prova-item { padding: 14px 16px; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
.prova-item:hover { background: #f3f4f6; border-color: #667eea; transform: translateX(4px); }
.prova-item .nome { font-weight: 600; color: #1f2937; }
.prova-item .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-disponivel { background: #dbeafe; color: #1d4ed8; }
.badge-aguardando { background: #fef3c7; color: #92400e; }
.badge-corrigida { background: #d1fae5; color: #065f46; }
.lista-ranking { max-height: 400px; overflow-y: auto; }
.ranking-item { display: flex; align-items: center; padding: 12px; border-radius: 10px; margin-bottom: 8px; background: #f9fafb; }
.ranking-item.destaque { background: #eff6ff; border: 2px solid #667eea; }
.ranking-item .posicao { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 12px; }
.pos-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; }
.pos-2 { background: linear-gradient(135deg, #cbd5e1, #94a3b8); color: white; }
.pos-3 { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
.pos-outros { background: #e5e7eb; color: #374151; font-size: 14px; }
.ranking-item .info { flex: 1; }
.ranking-item .info .nome { font-weight: 600; color: #1f2937; }
.ranking-item .info .sub { font-size: 12px; color: #6b7280; }
.ranking-item .nota { font-size: 20px; font-weight: 700; color: #667eea; }
.ranking-item.destaque .nota { color: #4f46e5; }
.empty { text-align: center; padding: 40px; color: #6b7280; }
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.vazio-lista { text-align: center; padding: 20px; color: #9ca3af; font-style: italic; }
</style>
</head>
<body>
<div class="container">
  <div class="cabecalho">
    <h2>Bem-vindo, <span id="nomeAluno"></span> 👋</h2>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
  
  <div class="grid">
    <div class="card">
      <h3><span class="icon">📝</span><span class="titulo">Provas</span></h3>
      <div id="disponiveisTitulo" style="display:none;">
        <h4 style="color:#1d4ed8; margin-bottom:10px;">Disponíveis para fazer</h4>
        <div class="lista-provas" id="listaProvas"></div>
      </div>
      <div id="minhasNotasTitulo" style="display:none; margin-top:20px;">
        <h4 style="color:#065f46; margin-bottom:10px;">Minhas Notas</h4>
        <div class="lista-provas" id="listaNotas"></div>
      </div>
      <div id="vazioProvas" class="empty" style="display:none;">
        <div class="icon">🎉</div>
        <p>Nenhuma prova disponível no momento!</p>
      </div>
    </div>
    
    <div class="card">
      <h3><span class="icon">🏆</span><span class="titulo">Ranking da Turma</span></h3>
      <div class="lista-ranking" id="listaRanking"></div>
      <div id="vazioRanking" class="vazio-lista" style="display:none;">
        Nenhuma nota registrada ainda.
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDoVdjkrWdJrrRC1BEeWksGkp4ydWcFW9Y",
  authDomain: "plataforma-escolar-71635.firebaseapp.com",
  projectId: "plataforma-escolar-71635",
  storageBucket: "plataforma-escolar-71635.firebasestorage.app",
  messagingSenderId: "194897243209",
  appId: "1:194897243209:web:ff339bee22bced4098e398"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const usuario = JSON.parse(localStorage.getItem("usuario") || "null");

if (!usuario || usuario.role !== "aluno") {
  window.location.href = "index.html";
}

document.getElementById("nomeAluno").innerText = usuario.nome;

window.sair = async function() {
  await auth.signOut();
  localStorage.clear();
  window.location.href = "index.html";
}

async function carregarProvas() {
  const listaProvas = document.getElementById("listaProvas");
  const listaNotas = document.getElementById("listaNotas");
  const disponiveisTitulo = document.getElementById("disponiveisTitulo");
  const minhasNotasTitulo = document.getElementById("minhasNotasTitulo");
  const vazioProvas = document.getElementById("vazioProvas");
  
  if (!usuario.turmaId) {
    listaProvas.innerHTML = '<div class="vazio-lista">Turma não encontrada</div>';
    return;
  }

  try {
    const turmaDoc = await db.collection("turmas").doc(usuario.turmaId).get();
    const provasTurma = turmaDoc.data()?.provas || [];
    const respostasSnap = await db.collection("respostas").where("alunoId", "==", usuario.uid).get();
    
    const respostasAluno = {};
    respostasSnap.forEach(r => {
      const data = r.data();
      respostasAluno[data.provaId] = data;
    });

    let temDisponivel = false;
    let temNota = false;

    for (const id of provasTurma) {
      try {
        const provaSnap = await db.collection("simulados").doc(id).get();
        if (!provaSnap.exists) continue;

        const prova = provaSnap.data();
        const resposta = respostasAluno[id];

        if (!resposta) {
          temDisponivel = true;
          const div = document.createElement("div");
          div.className = "prova-item";
          div.innerHTML = `<span class="nome">${prova.nome}</span><span class="badge badge-disponivel">Fazer</span>`;
          div.onclick = () => {
            localStorage.setItem("provaSelecionada", id);
            window.location = "prova.html";
          };
          listaProvas.appendChild(div);
        } else {
          temNota = true;
          const div = document.createElement("div");
          div.className = "prova-item";
          
          if (resposta.correcao) {
            const nota = resposta.correcao.notaFinal?.toFixed(1) || "-";
            div.innerHTML = `<span class="nome">${prova.nome}</span><span class="badge badge-corrigida">Nota: ${nota}</span>`;
          } else {
            div.innerHTML = `<span class="nome">${prova.nome}</span><span class="badge badge-aguardando">Aguardando correção</span>`;
          }
          listaNotas.appendChild(div);
        }
      } catch (e) {
        console.error("Erro:", e);
      }
    }

    disponiveisTitulo.style.display = temDisponivel ? "block" : "none";
    minhasNotasTitulo.style.display = temNota ? "block" : "none";
    vazioProvas.style.display = (!temDisponivel && !temNota) ? "block" : "none";
    
    if (!temDisponivel) listaProvas.innerHTML = '<div class="vazio-lista">Nenhuma prova disponível</div>';
    if (!temNota) listaNotas.innerHTML = '<div class="vazio-lista">Nenhuma prova feita ainda</div>';

  } catch (e) {
    console.error(e);
    listaProvas.innerHTML = '<div class="vazio-lista">Erro ao carregar provas</div>';
  }
}

async function carregarRanking() {
  const listaRanking = document.getElementById("listaRanking");
  const vazioRanking = document.getElementById("vazioRanking");

  if (!usuario.turmaId) return;

  try {
    // Consulta apenas respostas da turma do aluno (otimização)
    const respostasSnap = await db.collection("respostas").where("turmaId", "==", usuario.turmaId).get();
    const alunosMap = new Map(); // Agrupa por alunoId para evitar duplicatas

    respostasSnap.forEach(r => {
      const data = r.data();
      if (data.correcao && data.correcao.notaFinal !== undefined) {
        const existing = alunosMap.get(data.alunoId);
        // Mantém a maior nota para cada aluno
        if (!existing || data.correcao.notaFinal > existing.nota) {
          alunosMap.set(data.alunoId, {
            nome: data.aluno || "Aluno",
            nota: data.correcao.notaFinal,
            alunoId: data.alunoId
          });
        }
      }
    });

    const rankings = Array.from(alunosMap.values());

    rankings.sort((a, b) => b.nota - a.nota);

    if (rankings.length === 0) {
      vazioRanking.style.display = "block";
      return;
    }

    vazioRanking.style.display = "none";

    rankings.forEach((item, index) => {
      const pos = index + 1;
      const div = document.createElement("div");
      div.className = "ranking-item" + (item.alunoId === usuario.uid ? " destaque" : "");
      
      let posClass = "pos-outros";
      if (pos === 1) posClass = "pos-1";
      else if (pos === 2) posClass = "pos-2";
      else if (pos === 3) posClass = "pos-3";
      
      const medal = pos <= 3 ? ["🥇", "🥈", "🥉"][pos - 1] : pos;
      
      div.innerHTML = `
        <div class="posicao ${posClass}">${medal}</div>
        <div class="info">
          <div class="nome">${item.nome}${item.alunoId === usuario.uid ? " (você)" : ""}</div>
          <div class="sub">${pos === 1 ? "1º lugar" : pos === 2 ? "2º lugar" : pos === 3 ? "3º lugar" : `${pos}º lugar`}</div>
        </div>
        <div class="nota">${item.nota.toFixed(1)}</div>
      `;
      listaRanking.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    vazioRanking.style.display = "block";
  }
}

carregarProvas();
carregarRanking();
</script>
</body>
</html>
