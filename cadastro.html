<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Professor</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
.box { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h2 { margin: 0 0 30px; color: #333; text-align: center; font-size: 28px; }
.input-group { margin-bottom: 20px; }
label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 14px; }
input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
.checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.checkbox-item { display: flex; align-items: center; gap: 6px; padding: 10px 16px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
.checkbox-item:hover { border-color: #667eea; }
.checkbox-item.selected { background: #667eea; border-color: #667eea; color: white; }
.checkbox-item input { display: none; }
.btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.2s; margin-top: 10px; }
.btn:hover { transform: translateY(-2px); }
.btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
.link { text-align: center; margin-top: 20px; color: #666; }
.link a { color: #667eea; text-decoration: none; font-weight: 600; }
.link a:hover { text-decoration: underline; }
#erro { color: #e74c3c; text-align: center; margin-top: 15px; padding: 12px; background: #fdeaea; border-radius: 8px; display: none; }
#sucesso { color: #27ae60; text-align: center; margin-top: 15px; padding: 12px; background: #e8f8f0; border-radius: 8px; display: none; }
</style>
</head>
<body>

<div class="box">

<h2>Cadastro de Professor</h2>

<div class="input-group">
<label>Nome Completo</label>
<input id="nome" placeholder="Seu nome">
</div>

<div class="input-group">
<label>Disciplina(s) que Leciona</label>
<div class="checkbox-group" id="disciplinas">
<div class="checkbox-item" data-value="portugues" onclick="toggleDisciplina(this)">Português<input type="checkbox"></div>
<div class="checkbox-item" data-value="matematica" onclick="toggleDisciplina(this)">Matemática<input type="checkbox"></div>
<div class="checkbox-item" data-value="ciencias" onclick="toggleDisciplina(this)">Ciências<input type="checkbox"></div>
<div class="checkbox-item" data-value="historia" onclick="toggleDisciplina(this)">História<input type="checkbox"></div>
<div class="checkbox-item" data-value="geografia" onclick="toggleDisciplina(this)">Geografia<input type="checkbox"></div>
<div class="checkbox-item" data-value="arte" onclick="toggleDisciplina(this)">Arte<input type="checkbox"></div>
<div class="checkbox-item" data-value="edfisica" onclick="toggleDisciplina(this)">Ed. Física<input type="checkbox"></div>
<div class="checkbox-item" data-value="ingles" onclick="toggleDisciplina(this)">Inglês<input type="checkbox"></div>
<div class="checkbox-item" data-value="robotica" onclick="toggleDisciplina(this)">Robótica<input type="checkbox"></div>
</div>
</div>

<div class="input-group">
<label>Escola (opcional)</label>
<input id="escola" placeholder="Nome da escola onde trabalha">
</div>

<div class="input-group">
<label>Usuário</label>
<input id="login" placeholder="usuario">
</div>

<div class="input-group">
<label>Senha</label>
<input id="senha" type="password" placeholder="Mínimo 6 caracteres">
</div>

<div class="input-group">
<label>Confirmar Senha</label>
<input id="confirmarSenha" type="password" placeholder="Digite a senha novamente">
</div>

<button id="btnCadastrar" class="btn" onclick="cadastrar()">Cadastrar</button>

<div id="erro"></div>
<div id="sucesso"></div>

<p class="login-link">Já tem conta? <a href="index.html">Fazer login</a></p>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDoVdjkrWdJrrRC1BEeWksGkp4ydWcFW9Y",
  authDomain: "plataforma-escolar-71635.firebaseapp.com",
  projectId: "plataforma-escolar-71635",
  storageBucket: "plataforma-escolar-71635.firebasestorage.app",
  messagingSenderId: "194897243209",
  appId: "1:194897243209:web:ff339bee22bced4098e398"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const disciplinasSelecionadas = [];

window.toggleDisciplina = function(element) {
  const checkbox = element.querySelector('input');
  const value = element.dataset.value;
  
  if (disciplinasSelecionadas.includes(value)) {
    const index = disciplinasSelecionadas.indexOf(value);
    disciplinasSelecionadas.splice(index, 1);
    element.classList.remove('selected');
    checkbox.checked = false;
  } else {
    disciplinasSelecionadas.push(value);
    element.classList.add('selected');
    checkbox.checked = true;
  }
};

window.cadastrar = async function() {
  const nome = document.getElementById('nome').value.trim();
  const login = document.getElementById('login').value.trim().toLowerCase();
  const senha = document.getElementById('senha').value;
  const confirmarSenha = document.getElementById('confirmarSenha').value;
  const escola = document.getElementById('escola').value.trim();
  const erro = document.getElementById('erro');
  const sucesso = document.getElementById('sucesso');
  const btn = document.getElementById('btnCadastrar');

  erro.style.display = 'none';
  sucesso.style.display = 'none';

  if (!nome) {
    erro.innerText = 'Digite seu nome';
    erro.style.display = 'block';
    return;
  }

  if (disciplinasSelecionadas.length === 0) {
    erro.innerText = 'Selecione pelo menos uma disciplina';
    erro.style.display = 'block';
    return;
  }

  if (!login) {
    erro.innerText = 'Digite um usuário';
    erro.style.display = 'block';
    return;
  }

  if (!senha || senha.length < 6) {
    erro.innerText = 'Senha deve ter pelo menos 6 caracteres';
    erro.style.display = 'block';
    return;
  }

  if (senha !== confirmarSenha) {
    erro.innerText = 'As senhas não conferem';
    erro.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Cadastrando...';

  try {
    const email = `${login}@plataforma.app`;
    
    const userCred = await auth.createUserWithEmailAndPassword(email, senha);
    const uid = userCred.user.uid;

    await db.collection('users').doc(uid).set({
      nome: nome,
      email: email,
      role: 'professor',
      disciplinas: disciplinasSelecionadas,
      escola: escola || '',
      ativo: true,
      criadoEm: new Date(),
      turmas: []
    });

    sucesso.innerText = 'Cadastro realizado com sucesso!';
    sucesso.style.display = 'block';

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);

  } catch (err) {
    console.error('Erro cadastro:', err);
    
    let mensagem = 'Erro ao fazer cadastro';
    if (err.code === 'auth/email-already-in-use') {
      mensagem = 'Este usuário já existe. Escolha outro.';
    } else if (err.code === 'auth/invalid-email') {
      mensagem = 'Usuário inválido';
    } else if (err.code === 'auth/weak-password') {
      mensagem = 'Senha muito fraca';
    }

    erro.innerText = mensagem;
    erro.style.display = 'block';
    btn.disabled = false;
    btn.innerText = 'Cadastrar';
  }
};
</script>

</body>
</html>
