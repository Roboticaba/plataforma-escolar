<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ver Prova</title>
<link rel="stylesheet" href="professor-styles.css">
<style>
body { padding: 20px; }
.prova-container { max-width: 800px; margin: 0 auto; }
.prova-header { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.prova-header h2 { margin: 0 0 10px 0; color: #1e293b; }
.prova-meta { display: flex; gap: 20px; flex-wrap: wrap; color: #64748b; font-size: 14px; }
.questao-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.questao-numero { font-weight: 600; color: #3b82f6; margin-bottom: 10px; }
.questao-texto { font-size: 15px; line-height: 1.6; margin-bottom: 15px; }
.alternativa { padding: 8px 12px; margin: 5px 0; background: #f8fafc; border-radius: 6px; font-size: 14px; }
.alternativa.correta { background: #d1fae5; color: #065f46; font-weight: 500; }
.descritor-badge { display: inline-block; background: #dbeafe; color: #1d4ed8; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-top: 10px; }
.voltar-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #64748b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; text-decoration: none; margin-bottom: 20px; }
.voltar-btn:hover { background: #475569; }
.btn-pdf { background: #3b82f6; }
.btn-pdf:hover { background: #2563eb; }
.btn-excluir { background: #ef4444; }
.btn-excluir:hover { background: #dc2626; }
.acao-buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.loading { text-align: center; padding: 50px; color: #64748b; }
.error { text-align: center; padding: 50px; color: #ef4444; }
</style>
</head>
<body>

<div class="prova-container">
  <a href="professor.html" class="voltar-btn">← Voltar</a>
  
  <div id="loading" class="loading">Carregando prova...</div>
  <div id="error" class="error" style="display:none;">Prova não encontrada</div>
  
  <div id="prova-content" style="display:none;">
    <div class="prova-header">
      <h2 id="prova-nome">Nome da Prova</h2>
      <div class="prova-meta">
        <span id="prova-disciplina">Disciplina</span>
        <span id="prova-ano">Ano</span>
        <span id="prova-tempo">Tempo</span>
        <span id="prova-valor">Valor</span>
      </div>
    </div>
    
    <div id="lista-questoes"></div>
    
    <div class="acao-buttons">
      <button class="btn btn-primary" onclick="gerarPDF()">📄 Gerar PDF</button>
      <button class="btn btn-danger" onclick="excluirProva()">🗑️ Excluir Prova</button>
    </div>
  </div>
</div>

<div id="pdf-content" style="display:none;"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDoVdjkrWdJrrRC1BEeWksGkp4ydWcFW9Y",
  authDomain: "plataforma-escolar-71635.firebaseapp.com",
  projectId: "plataforma-escolar-71635",
  storageBucket: "plataforma-escolar-71635.firebasestorage.app",
  messagingSenderId: "194897243209",
  appId: "1:194897243209:web:ff339bee22bced4098e398"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let usuario = JSON.parse(localStorage.getItem("usuario") || "null");
if (!usuario || usuario.role !== "professor") {
  window.location.href = "index.html";
}

let provaAtualId = null;
let provaData = null;

function getQueryParam(param) {
  var urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

async function carregarProva() {
  var id = getQueryParam("id");
  if (!id) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent = "ID da prova não informado";
    return;
  }
  
  provaAtualId = id;
  
  try {
    var doc = await db.collection("simulados").doc(id).get();
    if (!doc.exists) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
      return;
    }
    
    provaData = doc.data();
    
    if (provaData.criadoPor !== usuario.uid) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "block";
      document.getElementById("error").textContent = "Você não tem permissão para ver esta prova";
      return;
    }
    
    document.getElementById("loading").style.display = "none";
    document.getElementById("prova-content").style.display = "block";
    
    document.getElementById("prova-nome").textContent = provaData.nome || "Prova sem nome";
    document.getElementById("prova-disciplina").textContent = provaData.disciplina || "Sem disciplina";
    document.getElementById("prova-ano").textContent = (provaData.ano || "?") + "º Ano";
    document.getElementById("prova-tempo").textContent = (provaData.tempo || 60) + " min";
    document.getElementById("prova-valor").textContent = (provaData.valor || 10) + " pontos";
    
    var questoes = provaData.questoes || [];
    var listaQuestoes = document.getElementById("lista-questoes");
    listaQuestoes.innerHTML = "";
    
    var letras = ["A", "B", "C", "D"];
    
    questoes.forEach(function(q, i) {
      var html = '<div class="questao-card">';
      html += '<div class="questao-numero">Questão ' + (i + 1) + '</div>';
      
      if (q.descritor) {
        var descritorTexto = q.descritor;
        if (q.descritorNome) descritorTexto += " - " + q.descritorNome;
        html += '<span class="descritor-badge">' + descritorTexto + '</span>';
      }
      
      if (q.textoAntes) {
        html += '<div style="background:#f8fafc;padding:10px;border-radius:6px;margin:10px 0;font-size:14px;">' + q.textoAntes + '</div>';
      }
      
      html += '<div class="questao-texto">' + q.pergunta + '</div>';
      
      if (q.alternativas && q.alternativas.length > 0) {
        q.alternativas.forEach(function(alt, j) {
          var classe = (j === q.correta) ? "alternativa correta" : "alternativa";
          html += '<div class="' + classe + '">(' + letras[j] + ') ' + alt + '</div>';
        });
      } else if (q.tipo === "texto") {
        html += '<div class="alternativa" style="font-style:italic;color:#64748b;">Resposta escrita pelo aluno</div>';
      }
      
      html += '</div>';
      listaQuestoes.innerHTML += html;
    });
    
    if (questoes.length === 0) {
      listaQuestoes.innerHTML = '<div style="color:#64748b;text-align:center;padding:30px;">Nenhuma questão adicionada nesta prova.</div>';
    }
    
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent = "Erro ao carregar: " + e.message;
  }
}

function gerarPDF() {
  var config = JSON.parse(localStorage.getItem("configProfessor") || "null");
  
  var letras = ["A", "B", "C", "D"];
  var questoes = provaData.questoes || [];
  var valorPorQuestao = ((provaData.valor || 10) / Math.max(questoes.length, 1)).toFixed(1);
  
  var htmlContent = '<div style="font-family:Arial,Helvetica,sans-serif;width:210mm;min-height:297mm;padding:12mm 15mm;box-sizing:border-box;">';
  
htmlContent += '<div style="border:2px solid #333;border-radius:8px;padding:10px 12px;margin-bottom:12px;">';
  
  htmlContent += '<div style="display:flex;align-items:stretch;">';
  if (config && config.logoUrl) {
    htmlContent += '<div style="flex-shrink:0;margin-right:10px;"><img src="' + config.logoUrl + '" style="width:100px;height:auto;display:block;"></div>';
  }
  htmlContent += '<div style="flex:1;display:flex;flex-direction:column;justify-content:space-between;">';
  htmlContent += '<div style="text-align:center;">';
  if (config && config.nomeEscola) {
    htmlContent += '<div style="font-size:14px;font-weight:bold;">' + config.nomeEscola + '</div>';
  }
  if (config && config.endereco) {
    htmlContent += '<div style="font-size:10px;color:#555;margin-top:2px;">' + config.endereco + '</div>';
  }
  htmlContent += '</div>';
  htmlContent += '<div style="margin-top:6px;">';
  htmlContent += '<div style="display:flex;align-items:center;margin-bottom:4px;">';
  htmlContent += '<span style="font-size:11px;white-space:nowrap;">ALUNO(A):</span>';
  htmlContent += '<div style="flex:1;border-bottom:1px solid #333;margin:0 6px;"></div>';
  htmlContent += '<span style="font-size:11px;white-space:nowrap;">TURMA:</span>';
  htmlContent += '<div style="width:30px;border-bottom:1px solid #333;margin:0 4px;"></div>';
  htmlContent += '</div>';
  var nomeProfessor = (config && config.nomeProfessor) ? config.nomeProfessor : "";
  htmlContent += '<div style="display:flex;align-items:center;margin-bottom:4px;">';
  htmlContent += '<span style="font-size:11px;white-space:nowrap;">PROFESSOR(A):</span>';
  if (nomeProfessor) {
    htmlContent += '<span style="font-size:11px;border-bottom:1px solid #333;padding:0 4px;white-space:nowrap;margin:0 6px;">' + nomeProfessor + '</span>';
  } else {
    htmlContent += '<div style="flex:1;border-bottom:1px solid #333;margin:0 6px;"></div>';
  }
  htmlContent += '</div>';
  htmlContent += '<div style="display:flex;align-items:center;">';
  htmlContent += '<span style="font-size:11px;white-space:nowrap;">DATA:</span>';
  htmlContent += '<span style="font-size:11px;border-bottom:1px solid #333;padding:0 4px;margin-left:4px;">___/___/______</span>';
  htmlContent += '</div>';
  htmlContent += '</div>';
  htmlContent += '</div>';
  
  if (config && config.textoLivre) {
    htmlContent += '<div style="background:#f0f0f0;padding:8px;margin-bottom:12px;font-size:11px;text-align:center;border-radius:4px;">' + config.textoLivre + '</div>';
  }
  
  htmlContent += '<div style="text-align:center;margin-bottom:15px;">';
  htmlContent += '<div style="font-size:18px;font-weight:bold;margin-bottom:3px;">' + (provaData.nome || "Prova") + '</div>';
  htmlContent += '<div style="font-size:11px;color:#555;">' + (provaData.disciplina || "") + ' | ' + (provaData.tempo || 60) + ' min | Valor Total: ' + (provaData.valor || 10) + ' pontos</div>';
  htmlContent += '</div>';
  
  questoes.forEach(function(q, i) {
    htmlContent += '<div style="margin-bottom:16px;page-break-inside:avoid;">';
    htmlContent += '<p style="font-weight:bold;margin:0 0 5px 0;font-size:12px;">' + (i + 1) + ') ' + q.pergunta + ' <span style="font-weight:normal;color:#666;">(' + valorPorQuestao + ' pts)</span></p>';
    
    if (q.textoAntes) {
      htmlContent += '<div style="background:#fafafa;padding:6px;margin-bottom:6px;font-size:11px;border-left:3px solid #ccc;">' + q.textoAntes + '</div>';
    }
    
    if (q.alternativas && q.alternativas.length > 0) {
      q.alternativas.forEach(function(alt, j) {
        htmlContent += '<div style="margin:3px 0;font-size:11px;padding-left:15px;">&#9675; ' + alt + '</div>';
      });
    } else if (q.tipo === "texto") {
      htmlContent += '<div style="border-bottom:1px solid #999;min-height:20px;margin-top:8px;"></div>';
    }
    
    htmlContent += '</div>';
  });
  
  htmlContent += '</div>';
  
  var container = document.getElementById("pdf-content");
  container.innerHTML = htmlContent;
  container.style.display = "block";
  
  var opt = {
    margin: 0,
    filename: (provaData.nome || "prova").replace(/[^a-zA-Z0-9]/g, "_") + ".pdf",
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
  };
  
  html2pdf().set(opt).from(container).save().then(function() {
    container.style.display = "none";
  });
}

async function excluirProva() {
  if (!confirm("Tem certeza que deseja excluir esta prova? Esta ação não pode ser desfeita.")) {
    return;
  }
  
  try {
    await db.collection("simulados").doc(provaAtualId).delete();
    alert("Prova excluída com sucesso!");
    window.location.href = "professor.html";
  } catch (e) {
    alert("Erro ao excluir: " + e.message);
  }
}

carregarProva();
</script>

</body>
</html>
