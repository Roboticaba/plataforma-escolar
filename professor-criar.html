function classifyDescriptorAutomatically(textoQuestao, disc, ano) {
  if (!textoQuestao || !disc) return null;
  var texto = textoQuestao.toLowerCase();
  var hints = DESCRIPTOR_HINTS[disc];
  if (!hints) return null;
  var bestMatch = null;
  var bestScore = 0;
  var descritoresAno = disc === "portugues" ? descritoresPortugues[ano] : descritoresMatematica[ano];
  if (!descritoresAno) return null;
  for (var i = 0; i < descritoresAno.length; i++) {
    var d = descritoresAno[i];
    var keywords = hints[d.c] || [];
    var score = 0;
    for (var j = 0; j < keywords.length; j++) {
      if (texto.indexOf(keywords[j].toLowerCase()) !== -1) score++;
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = d;
    }
  }
  return bestScore > 0 ? bestMatch : null;
}

function sugerirDescritorQuestao() {
  var textoQuestao = document.getElementById("pergunta").value;
  var disc = document.getElementById("disciplinaProva").value;
  var ano = document.getElementById("anoProva").value;
  if (!textoQuestao) { alert("Digite a pergunta primeiro"); return; }
  if (!disc || !ano) { alert("Selecione disciplina e ano primeiro"); return; }
  var resultado = classifyDescriptorAutomatically(textoQuestao, disc, ano);
  if (resultado) {
    document.getElementById("descritorQuestao").value = resultado.c + "|" + resultado.n;
    alert("SugestГғВЈo: " + resultado.c + " - " + resultado.n);
  } else {
    alert("Nenhum descritor encontrado para este conteГғВәdo. VocГғВӘ pode selecionar manualmente.");
  }
}

function uploadFileToCloudinary(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var dataUrl = e.target.result;
      var base64 = dataUrl.split(",")[1];
      var xhr = new XMLHttpRequest();
      xhr.open("POST", "https://api.cloudinary.com/v1_1/dflo5rpxy/image/upload");
      xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
      xhr.onload = function() {
        if (xhr.status === 200) {
          var res = JSON.parse(xhr.responseText);
          resolve(res.secure_url);
        } else {
          reject(new Error("Upload failed"));
        }
      };
      xhr.onerror = function() { reject(new Error("Upload failed")); };
      xhr.send("file=" + encodeURIComponent(base64) + "&upload_preset=alunos_upload");
    };
    reader.onerror = function() { reject(new Error("Read failed")); };
    reader.readAsDataURL(file);
  });
}

async function adicionarQuestao() {
  const tipo = document.getElementById("tipoQuestao").value;
  const tipoAlt = document.getElementById("tipoAlternativa").value;
  const textoAntes = document.getElementById("textoAntes").value;
  const pergunta = document.getElementById("pergunta").value.trim();
  const disc = document.getElementById("disciplinaProva").value;
  
  if (!pergunta) { alert("Digite a pergunta"); return; }
  
  try {
    var alternativas = [];
    var correta = null;
    if (tipo === "multipla") {
      if (tipoAlt === "texto") {
        var linhas = document.getElementById("alternativasTexto").value.split("\n");
        alternativas = linhas.map(function(l) { return l.trim(); }).filter(function(l) { return l; });
      }
      if (alternativas.length < 2) { alert("Digite pelo menos 2 alternativas"); return; }
      correta = parseInt(document.getElementById("correta").value);
    }
    
    questoesTemp.push({ tipo: tipo, tipoAlt: tipoAlt, textoAntes: textoAntes, pergunta: pergunta, alternativas: alternativas, correta: correta, disciplina: disc });
    
    document.getElementById("textoAntes").value = "";
    document.getElementById("pergunta").value = "";
    document.getElementById("alternativasTexto").value = "";
    renderQuestoes();
    alert("QuestГғВЈo adicionada!");
  } catch (e) {
    alert("Erro ao adicionar questГғВЈo: " + e.message);
  }
}

function renderQuestoes() {
  var lista = document.getElementById("listaQuestoes");
  var resumo = document.getElementById("resumoQuestoes");
  
  if (questoesTemp.length === 0) {
    resumo.textContent = "Nenhuma questГғВЈo adicionada ainda.";
    lista.innerHTML = "";
    return;
  }
  
  var letras = ["A","B","C","D"];
  resumo.textContent = questoesTemp.length + " questГғВЈo(ГғВөes) adicionada(s)";
  lista.innerHTML = "";
  questoesTemp.forEach(function(q, i) {
    var html = '<div style="background:white;border-radius:8px;padding:15px;margin-bottom:10px;border:1px solid #e2e8f0;">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font-weight:600;">QuestГғВЈo ' + (i+1) + '</span><button onclick="removerQuestao(' + i + ')" style="background:#ef4444;color:white;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;">ГўЕ“вҖў</button></div>';
    html += '<div style="font-size:14px;">' + q.pergunta + '</div>';
    if (q.alternativas && q.alternativas.length > 0) {
      html += '<div style="margin-top:10px;font-size:13px;">';
      q.alternativas.forEach(function(alt, j) {
        html += '<div' + (j === q.correta ? ' style="color:#10b981;font-weight:600;"' : '') + '>(' + letras[j] + ') ' + alt + '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
    lista.innerHTML += html;
  });
}

function removerQuestao(index) {
  questoesTemp.splice(index, 1);
  renderQuestoes();
}

  var nome = document.getElementById("nomeProva").value.trim();

  var disc = document.getElementById("disciplinaProva").value;
  var tempo = parseInt(document.getElementById("tempoProva").value) || 60;
  var valor = parseFloat(document.getElementById("valorProva").value.replace(",", ".")) || 10;
  
  if (!nome || !ano || !disc) { alert("Preencha nome, ano e disciplina"); return; }
  if (questoesTemp.length === 0) { alert("Adicione pelo menos uma questГғВЈo"); return; }
  
  try {
    await db.collection("simulados").add({
      nome: nome,
      ano: ano,
      disciplina: disc,
      tempo: tempo,
      valor: valor,
      questoes: questoesTemp,
      criadoPor: usuario.uid,
      criadoEm: new Date()
    });
    alert("Prova salva com sucesso!");
    window.location.reload();
  } catch (e) {
    alert("Erro ao salvar: " + e.message);
  }
}

renderQuestoes();
</script>

</html>
