<script>
const firebaseConfig = {
  apiKey: "AIzaSyDoVdjkrWdJrrRC1BEeWksGkp4ydWcFW9Y",
  authDomain: "plataforma-escolar-71635.firebaseapp.com",
  projectId: "plataforma-escolar-71635",
  storageBucket: "plataforma-escolar-71635.firebasestorage.app",
  messagingSenderId: "194897243209",
  appId: "1:194897243209:web:ff339bee22bced4098e398"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const secondaryApp = firebase.initializeApp(firebaseConfig, 'secondary');
const secondaryAuth = secondaryApp.auth();

let usuario = JSON.parse(localStorage.getItem("usuario") || "null");
if (!usuario || usuario.role !== "professor") {
  window.location.href = "index.html";
}
if (usuario.ativo === false) {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("nomeProfessor").textContent = usuario.nome || "Professor";
  trocarAba("turmas");

<!-- MODAL: DETALHES DA TURMA -->

  <div class="modal">
    <div class="modal-header">

      <button class="tab-inner active" style="padding:12px 18px;background:none;border:none;cursor:pointer;font-size:14px;color:#64748b;border-bottom:2px solid transparent;" data-aba="alunos" onclick="trocarAbaTurma('alunos')">Alunos</button>
      <button class="tab-inner" style="padding:12px 18px;background:none;border:none;cursor:pointer;font-size:14px;color:#64748b;border-bottom:2px solid transparent;" data-aba="provas" onclick="trocarAbaTurma('provas')">Provas</button>
      <button class="tab-inner" style="padding:12px 18px;background:none;border:none;cursor:pointer;font-size:14px;color:#64748b;border-bottom:2px solid transparent;" data-aba="notas" onclick="trocarAbaTurma('notas')">Notas</button>

<!-- MODAL: CONFIGURAÇÕES -->
<div class="modal-overlay" id="modalConfig">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Configurações do Cabeçalho</h3>
      <button class="modal-close" onclick="fecharConfig()">&times;</button>
    </div>
    <div class="form-group">
      <label>Nome da Escola</label>
      <input id="cfgNomeEscola" placeholder="Escola Municipal...">
    </div>
    <div class="form-group">
      <label>Endereço</label>
      <input id="cfgEndereco" placeholder="Rua, número - Bairro - Cidade">
    </div>
    <div class="form-group">
      <label>Logo</label>
      <input type="file" id="inputLogo" accept="image/*" onchange="uploadLogo()">
      <div id="previewLogo" style="margin-top:10px;"></div>
    </div>
    <div class="form-group">
      <label>Nome do Professor</label>
      <input id="cfgNomeProfessor" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label>Texto Livre</label>
      <textarea id="cfgTextoLivre" placeholder="Ex.: Leia com atenção..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-success" onclick="salvarConfig()">Salvar</button>
      <button class="btn btn-outline" onclick="fecharConfig()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// --- VARIÁVEIS GLOBAIS ---
let turmaAtualId = null;
let provaAtualId = null;
let questoesTemp = [];
let logoData = "";

// --- NAVEGAÇÃO ---
function trocarAba(aba) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-aba="' + aba + '"]').classList.add('active');
  document.getElementById('aba-' + aba).classList.add('active');

  if (aba === 'turmas') carregarTurmas();
  if (aba === 'banco') filtrarProvas();
}

function sair() {
  localStorage.removeItem('usuario');
  window.location.href = 'index.html';
}

// --- CONFIGURAÇÕES ---
function abrirConfig() {
  document.getElementById('modalConfig').classList.add('active');
  carregarConfig();
}

function fecharConfig() {
  document.getElementById('modalConfig').classList.remove('active');
}

function carregarConfig() {
  const config = JSON.parse(localStorage.getItem('configProfessor') || 'null');
  if (config) {
    document.getElementById('cfgNomeEscola').value = config.nomeEscola || '';
    document.getElementById('cfgEndereco').value = config.endereco || '';
    document.getElementById('cfgNomeProfessor').value = config.nomeProfessor || '';
    document.getElementById('cfgTextoLivre').value = config.textoLivre || '';
    if (config.logoUrl) {
      document.getElementById('previewLogo').innerHTML = '<img src="' + config.logoUrl + '" style="max-height:80px;">';
    }
  }
}

function salvarConfig() {
  const config = {
    nomeEscola: document.getElementById('cfgNomeEscola').value,
    endereco: document.getElementById('cfgEndereco').value,
    logoUrl: logoData,
    nomeProfessor: document.getElementById('cfgNomeProfessor').value,
    textoLivre: document.getElementById('cfgTextoLivre').value
  };
  localStorage.setItem('configProfessor', JSON.stringify(config));
  alert('Configurações salvas!');
  fecharConfig();
}

function uploadLogo() {
  const file = document.getElementById('inputLogo').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    logoData = e.target.result;
    document.getElementById('previewLogo').innerHTML = '<img src="' + logoData + '" style="max-height:80px;">';
  };
  reader.readAsDataURL(file);
}

// --- TURMAS ---
async function carregarTurmas() {
  const lista = document.getElementById('lista-turmas');
  lista.innerHTML = '<div class="empty-state"><div>📚</div><div>Carregando...</div></div>';

  try {
    const snap = await db.collection('turmas').get();
    const turmas = snap.docs.filter(d => d.data().criadoPor === usuario.uid);

    if (turmas.length === 0) {
      lista.innerHTML = '<div class="empty-state"><div>📚</div><div>Nenhuma turma</div><div>Crie sua primeira turma</div></div>';
      return;
    }

    lista.innerHTML = '';
    turmas.forEach(doc => {
      const t = doc.data();
      const div = document.createElement('div');
      div.className = 'turma-card';
      div.innerHTML = `
        <div class="turma-info">
          <h3>${escapeHtml(t.nome)}</h3>
          <div class="turma-meta">${(t.alunos || []).length} alunos • ${(t.provas || []).length} provas</div>
        </div>
        <div class="turma-actions">
          <button class="btn btn-primary btn-sm" onclick="abrirTurma('${doc.id}', '${escapeHtml(t.nome)}')">Gerenciar</button>
          <button class="btn btn-danger btn-sm" onclick="excluirTurma('${doc.id}')">Excluir</button>
        </div>
      `;
      lista.appendChild(div);
    });
  } catch (e) {
    lista.innerHTML = '<div class="empty-state"><div>⚠️</div><div>Erro ao carregar: ' + e.message + '</div></div>';
  }
}

async function criarTurma() {
  const nome = prompt('Nome da turma (ex: 7º Ano A):');
  if (!nome) return;
  
  // Extraer anno do nome se possível
  let ano = 1;
  const match = nome.match(/(\d+)\s*º?\s*ano/i);
  if (match) {
    ano = parseInt(match[1]);
  } else {
    const anoInput = prompt('Ano/Série da turma (1-5):');
    if (anoInput) ano = parseInt(anoInput);
  }
  
  try {
    await db.collection('turmas').add({
      nome: nome,
      ano: ano,
      alunos: [],
      provas: [],
      criadoPor: usuario.uid,
      criarEm: firebase.firestore.FieldValue.serverTimestamp()
    });
    carregarTurmas();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

async function excluirTurma(id) {
  if (!confirm('Excluir turma?')) return;
  await db.collection('turmas').doc(id).delete();
  carregarTurmas();
}

// --- MODAL TURMA ---
function abrirTurma(id, nome) {
  turmaAtualId = id;
  document.getElementById('tituloTurmaModal').textContent = nome;
  document.getElementById('modalTurma').classList.add('active');
  carregarDadosTurma();
}

function fecharModalTurma() {
  document.getElementById('modalTurma').classList.remove('active');
  turmaAtualId = null;
}

function trocarAbaTurma(aba) {
  // Remove active from all inner tabs
  document.querySelectorAll('.tab-inner').forEach(b => {
    b.classList.remove('active');
    b.style.color = '#64748b';
    b.style.borderBottomColor = 'transparent';
  });
  document.querySelectorAll('.tab-content-inner').forEach(c => c.classList.remove('active'));
  
  // Add active to clicked
  const btn = document.querySelector('[data-aba="' + aba + '"]');
  if (btn) {
    btn.classList.add('active');
    btn.style.color = '#3b82f6';
    btn.style.borderBottomColor = '#3b82f6';
  }
  const content = document.getElementById('aba-' + aba + '-turma');
  if (content) content.classList.add('active');
}

async function carregarDadosTurma() {
  if (!turmaAtualId) return;

  // Carregar alunos da subcoleção
  const listaAlunos = document.getElementById('lista-alunos-turma');
  listaAlunos.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Carregando...</div>';

  try {
    const snapAlunos = await db.collection('turmas').doc(turmaAtualId).collection('alunos').get();
    if (snapAlunos.empty) {
      listaAlunos.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Nenhum aluno nesta turma</div>';
    } else {
      listaAlunos.innerHTML = '';
      snapAlunos.forEach(doc => {
        const a = doc.data();
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <div>
            <strong>${escapeHtml(a.nome)}</strong>
            <span class="status-badge ${a.ativo !== false ? 'status-ativos' : 'status-inativos'}">${a.ativo !== false ? 'Ativo' : 'Inativo'}</span>
          </div>
          <div>
            <button class="btn btn-outline btn-sm" onclick="alternarAluno('${doc.id}', ${a.ativo !== false})">${a.ativo !== false ? 'Inativar' : 'Ativar'}</button>
            <button class="btn btn-danger btn-sm" onclick="removerAluno('${doc.id}')">X</button>
          </div>
        `;
        listaAlunos.appendChild(div);
      });
    }
  } catch (e) {
    listaAlunos.innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">Erro: ' + e.message + '</div>';
  }

  // Carregar provas atribuídas - filtrar por ano da turma
  const listaProvas = document.getElementById('lista-provas-turma');
  const selectProvaNotas = document.getElementById('selectProvaNotas');
  listaProvas.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Carregando...</div>';
  selectProvaNotas.innerHTML = '<option value="">Carregando...</option>';

  try {
    const docTurma = await db.collection('turmas').doc(turmaAtualId).get();
    const turmasData = docTurma.data();
    const provasIds = turmasData.provas || [];
    const turmaAno = turmasData.ano || null; // Buscar o ano da turma

    // Update dropdown for notas - apenas provas do mesmo ano
    selectProvaNotas.innerHTML = '<option value="">Selecione uma prova...</option>';
    for (const pid of provasIds) {
      const dp = await db.collection('simulados').doc(pid).get();
      if (dp.exists) {
        const provaAno = dp.data().ano;
        selectProvaNotas.innerHTML += `<option value="${pid}">${dp.data().nome} (${provaAno}º ano)</option>`;
      }
    }

    if (provasIds.length === 0) {
      listaProvas.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Nenhuma prova atribuída</div>';
    } else {
      listaProvas.innerHTML = '';
      for (const pid of provasIds) {
        const dp = await db.collection('simulados').doc(pid).get();
        if (dp.exists) {
          const p = dp.data();
          const div = document.createElement('div');
          div.className = 'list-item';
          div.innerHTML = `
            <div>
              <strong>${escapeHtml(p.nome)}</strong>
              <span style="font-size:12px;color:#64748b;margin-left:8px;">${p.ano}º ano - ${p.disciplina || ''}</span>
            </div>
            <button class="btn btn-danger btn-sm" onclick="removerProvaTurma('${pid}')">X</button>
          `;
          listaProvas.appendChild(div);
        }
      }
    }
  } catch (e) {
    listaProvas.innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">Erro: ' + e.message + '</div>';
  }
}

// --- ALUNOS ---
function mostrarFormAluno() {
  document.getElementById('form-adicionar-aluno').style.display = 'block';
}

function ocultarFormAluno() {
  document.getElementById('form-adicionar-aluno').style.display = 'none';
  document.getElementById('nomeAluno').value = '';
  document.getElementById('senhaAluno').value = '';
}

async function adicionarAluno() {
  if (!turmaAtualId) return;
  const nome = document.getElementById('nomeAluno').value.trim();
  const senha = document.getElementById('senhaAluno').value.trim();
  if (!nome || !senha) {
    alert('Preencha nome e senha');
    return;
  }

  const email = nome.toLowerCase().replace(/\s+/g, '.') + '.aluno.' + turmaAtualId + '@plataforma.app';

  try {
    // First, check if user already exists
    const existingUser = await db.collection('users').where('email', '==', email).get();

    if (!existingUser.empty) {
      // User already exists - just add to this class
      const uid = existingUser.docs[0].id;
      await db.collection('turmas').doc(turmaAtualId).collection('alunos').doc(uid).set({
        nome: nome,
        email: email,
        ativo: true,
        dataIngresso: firebase.firestore.FieldValue.serverTimestamp()
      });
      await db.collection('users').doc(uid).update({
        turmaId: turmaAtualId,
        ativo: true
      });
      alert('Aluno adicionado à turma!');
    } else {
      // Create new user
      const cred = await secondaryAuth.createUserWithEmailAndPassword(email, senha);
      const uid = cred.user.uid;

      await db.collection('users').doc(uid).set({
        nome: nome,
        role: 'aluno',
        turmaId: turmaAtualId,
        ativo: true,
        email: email,
        criarEm: firebase.firestore.FieldValue.serverTimestamp()
      });

      await db.collection('turmas').doc(turmaAtualId).collection('alunos').doc(uid).set({
        nome: nome,
        email: email,
        ativo: true,
        dataIngresso: firebase.firestore.FieldValue.serverTimestamp()
      });

      await secondaryAuth.signOut();
      alert('Aluno criado! Email: ' + email);
    }

    ocultarFormAluno();
    carregarDadosTurma();
  } catch (err) {
    console.error('Erro ao adicionar aluno:', err);
    alert('Erro: ' + err.message);
  }
}

async function alternarAluno(uid, ativo) {
  try {
    await db.collection('users').doc(uid).update({ ativo: !ativo });
    await db.collection('turmas').doc(turmaAtualId).collection('alunos').doc(uid).update({ ativo: !ativo });
    carregarDadosTurma();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

async function removerAluno(uid) {
  if (!confirm('Remover aluno da turma?')) return;
  try {
    await db.collection('users').doc(uid).update({ ativo: false, turmaId: null });
    await db.collection('turmas').doc(turmaAtualId).collection('alunos').doc(uid).delete();
    carregarDadosTurma();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

// --- PROVAS ---

  const select = document.getElementById('selectProvaAtribuir');
  select.innerHTML = '<option value="">Carregando...</option>';
  document.getElementById('form-atribuir-prova').style.display = 'block';

  db.collection('simulados').where('criadoPor', '==', usuario.uid).get()
    .then(snap => {
      const provas = snap.docs.filter(d => {
        const docTurma = db.collection('turmas').doc(turmaAtualId);
        // Filter simples - apenas Lista
        return true;
      });
      select.innerHTML = snap.docs.map(d => `<option value="${d.id}">${d.data().nome}</option>`).join('');
    });
}

function ocultarAtribuirProva() {
  document.getElementById('form-atribuir-prova').style.display = 'none';
}

async function atribuirProva() {
  const pid = document.getElementById('selectProvaAtribuir').value;
  if (!pid || !turmaAtualId) return;

  try {
    await db.collection('turmas').doc(turmaAtualId).update({
      provas: firebase.firestore.FieldValue.arrayUnion(pid)
    });
    ocultarAtribuirProva();
    carregarDadosTurma();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

async function carregarNotasProva() {
  const pid = document.getElementById('selectProvaNotas').value;
  const lista = document.getElementById('lista-notas-turma');

  if (!pid) {
    lista.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Selecione uma prova.</div>';
    return;
  }

  lista.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Carregando...</div>';

  try {
    const snap = await db.collection('respostas').where('provaId', '==', pid).get();

    if (snap.empty) {
      lista.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;">Nenhuma resposta desta prova ainda.</div>';
      return;
    }

    lista.innerHTML = '<table style="width:100%;border-collapse:collapse;"><tr style="background:#f8fafc;"><th style="padding:10px;text-align:left;">Aluno</th><th style="padding:10px;">Nota</th><th style="padding:10px;">Ações</th></tr>';

    for (const doc of snap.docs) {
      const r = doc.data();
      const userDoc = await db.collection('users').doc(r.alunoId).get();
      const alunoNome = userDoc.exists ? userDoc.data().nome : 'Desconhecido';

      lista.innerHTML += `<tr style="border-bottom:1px solid #e2e8f0;">
        <td style="padding:10px;">${escapeHtml(alunoNome)}</td>
        <td style="padding:10px;text-align:center;">
          <input type="number" step="0.1" min="0" max="10" value="${r.nota || ''}" style="width:60px;padding:5px;" id="nota-${doc.id}" />
        </td>
        <td style="padding:10px;text-align:center;">
          <button class="btn btn-primary btn-sm" onclick="salvarNota('${doc.id}')">Salvar</button>
        </td>
      </tr>`;
    }
    lista.innerHTML += '</table>';
  } catch (e) {
    lista.innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">Erro: ' + e.message + '</div>';
  }
}

async function salvarNota(respostaId) {
  const nota = parseFloat(document.getElementById('nota-' + respostaId).value);
  if (isNaN(nota)) {
    alert('Digite uma nota válida');
    return;
  }
  try {
    await db.collection('respostas').doc(respostaId).update({
      nota: nota,
      corrigida: true,
      dataCorrecao: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert('Nota salva!');
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}
}

async function removerProvaTurma(pid) {
  if (!confirm('Remover prova da turma?')) return;
  try {
    await db.collection('turmas').doc(turmaAtualId).update({
      provas: firebase.firestore.FieldValue.arrayRemove(pid)
    });
    carregarDadosTurma();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

// --- PROVAS (BANCO) ---
async function filtrarProvas() {
  const lista = document.getElementById('lista-provas');
  lista.innerHTML = '<div class="empty-state"><div>📋</div><div>Carregando...</div></div>';

  const ano = document.getElementById('filtroAno').value;
  const disc = document.getElementById('filtroDisc').value;

  try {
    let snap;
    if (ano && disc) {
      snap = await db.collection('simulados').where('ano', '==', ano).where('disciplina', '==', disc).where('criadoPor', '==', usuario.uid).get();
    } else if (ano) {
      snap = await db.collection('simulados').where('ano', '==', ano).where('criadoPor', '==', usuario.uid).get();
    } else if (disc) {
      snap = await db.collection('simulados').where('disciplina', '==', disc).where('criadoPor', '==', usuario.uid).get();
    } else {
      snap = await db.collection('simulados').where('criadoPor', '==', usuario.uid).get();
    }

    if (snap.empty) {
      lista.innerHTML = '<div class="empty-state"><div>📋</div><div>Nenhuma prova</div></div>';
      return;
    }

    lista.innerHTML = snap.docs.map(d => {
      const p = d.data();
      return `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div style="font-weight:600;font-size:16px;">${escapeHtml(p.nome)}</div>
              <div style="font-size:13px;color:#64748b;">${p.disciplina || ''} - ${p.ano || ''}º ano - ${(p.questoes || []).length} questões</div>
            </div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-outline btn-sm" onclick="verProva('${d.id}')">Ver</button>
              <button class="btn btn-danger btn-sm" onclick="excluirProva('${d.id}')">Excluir</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    lista.innerHTML = '<div class="empty-state"><div>⚠️</div><div>Erro ao carregar</div></div>';
  }
}

function verProva(id) {
  window.open('professor-ver.html?id=' + id, '_blank');
}

async function excluirProva(id) {
  if (!confirm('Excluir prova?')) return;
  await db.collection('simulados').doc(id).delete();
  filtrarProvas();
}
