<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Professor</title>
<link rel="stylesheet" href="professor-styles.css">
<style>
.tab-frame { width: 100%; height: calc(100vh - 130px); border: none; }
</style>
</head>
<body>

<header class="header">
  <h1 class="logo">📚 Plataforma Escolar</h1>
  <div class="header-actions">
    <span class="user-name" id="nomeProfessor"></span>
    <button class="btn btn-outline btn-sm" onclick="abrirConfig()">⚙ Configurações</button>
    <button class="sair-btn" onclick="sair()">Sair</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" id="tab-turmas" onclick="mostrarTurmas()">📚 Turmas</button>
  <button class="tab" id="tab-banco" onclick="mostrarBanco()">📋 Banco de Provas</button>
  <button class="tab" id="tab-criar" onclick="mostrarCriar()">➕ Criar Prova</button>
</nav>

<main class="main">
  <iframe id="frame-turmas" class="tab-frame" src="professor-turmas.html"></iframe>
  <iframe id="frame-banco" class="tab-frame" src="professor-banco.html" style="display:none;"></iframe>
  <iframe id="frame-criar" class="tab-frame" src="professor-criar.html" style="display:none;"></iframe>
</main>

<script>
let usuario = JSON.parse(localStorage.getItem("usuario") || "null");
if (!usuario || usuario.role !== "professor") {
  window.location.href = "index.html";
}
document.getElementById("nomeProfessor").textContent = usuario.nome || "Professor";

function mostrarTurmas() {
  document.getElementById("tab-turmas").classList.add("active");
  document.getElementById("tab-banco").classList.remove("active");
  document.getElementById("tab-criar").classList.remove("active");
  document.getElementById("frame-turmas").style.display = "block";
  document.getElementById("frame-banco").style.display = "none";
  document.getElementById("frame-criar").style.display = "none";
}

function mostrarBanco() {
  document.getElementById("tab-turmas").classList.remove("active");
  document.getElementById("tab-banco").classList.add("active");
  document.getElementById("tab-criar").classList.remove("active");
  document.getElementById("frame-turmas").style.display = "none";
  document.getElementById("frame-banco").style.display = "block";
  document.getElementById("frame-criar").style.display = "none";
}

function mostrarCriar() {
  document.getElementById("tab-turmas").classList.remove("active");
  document.getElementById("tab-banco").classList.remove("active");
  document.getElementById("tab-criar").classList.add("active");
  document.getElementById("frame-turmas").style.display = "none";
  document.getElementById("frame-banco").style.display = "none";
  document.getElementById("frame-criar").style.display = "block";
}

function sair() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

function abrirConfig() {
  document.getElementById("modalConfig").classList.add("active");
  carregarConfig();
}

function fecharConfig() {
  document.getElementById("modalConfig").classList.remove("active");
}

function salvarConfig() {
  var config = {
    nomeEscola: document.getElementById("cfgNomeEscola").value,
    endereco: document.getElementById("cfgEndereco").value,
    logoUrl: logoData,
    nomeProfessor: document.getElementById("cfgNomeProfessor").value,
    textoLivre: document.getElementById("cfgTextoLivre").value
  };
  localStorage.setItem("configProfessor", JSON.stringify(config));
  alert("Configurações salvas!");
  fecharConfig();
}

function carregarConfig() {
  var config = JSON.parse(localStorage.getItem("configProfessor") || "null");
  if (config) {
    document.getElementById("cfgNomeEscola").value = config.nomeEscola || "";
    document.getElementById("cfgEndereco").value = config.endereco || "";
    document.getElementById("cfgNomeProfessor").value = config.nomeProfessor || "";
    document.getElementById("cfgTextoLivre").value = config.textoLivre || "";
    if (config.logoUrl) {
      document.getElementById("previewLogo").innerHTML = '<img src="' + config.logoUrl + '" style="max-height:80px;">';
    }
  }
}

function uploadLogo() {
  var file = document.getElementById("inputLogo").files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    logoData = e.target.result;
    document.getElementById("previewLogo").innerHTML = '<img src="' + logoData + '" style="max-height:80px;">';
  };
  reader.readAsDataURL(file);
}

var logoData = "";
</script>

<div class="modal-overlay" id="modalConfig">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Configurações do Cabeçalho</h3>
      <button class="modal-close" onclick="fecharConfig()">&times;</button>
    </div>
    <div class="form-group">
      <label>Nome da Escola</label>
      <input id="cfgNomeEscola" placeholder="Escola Municipal...">
    </div>
    <div class="form-group">
      <label>Endereço da Escola</label>
      <input id="cfgEndereco" placeholder="Rua, número - Bairro - Cidade">
    </div>
    <div class="form-group">
      <label>Logo (imagem)</label>
      <input type="file" id="inputLogo" accept="image/*" onchange="uploadLogo()" style="padding:10px;">
      <div id="previewLogo" style="margin-top:10px;"></div>
    </div>
    <div class="form-group">
      <label>Nome do Professor</label>
      <input id="cfgNomeProfessor" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label>Texto Livre (opcional)</label>
      <textarea id="cfgTextoLivre" placeholder="Ex.: Leia com atenção..."></textarea>
    </div>
    <div style="background:#e8f5e9;padding:15px;border-radius:8px;margin-top:15px;">
      <p style="margin:0;font-size:13px;color:#2e7d32;">💡 Estes dados serão salvos e usados automaticamente em todos os PDFs que você gerar.</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-success" onclick="salvarConfig()">Salvar</button>
      <button class="btn btn-secondary" onclick="fecharConfig()">Cancelar</button>
    </div>
  </div>
</div>

</body>
</html>
